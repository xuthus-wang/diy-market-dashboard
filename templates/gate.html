<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY市场周报系统 · 需登录</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--t2:#94a3b8;--acc:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:34px 30px;width:380px;max-width:92vw;text-align:center}
h1{font-size:1.35rem;font-weight:700;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--t2);font-size:.85rem;margin:6px 0 16px}
.note{background:rgba(59,130,246,.12);color:var(--acc);padding:11px 14px;border-radius:9px;font-size:.85rem;line-height:1.6}
.hint{color:var(--t2);font-size:.78rem;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <h1>🔧 DIY市场周报系统</h1>
  <p class="sub">设备销售追踪 · 趋势分析 · 爆款预测</p>
  <div class="note">本看板为<b>付费会员专享</b>，需登录后查看。<br>请使用管理员提供的专属访问地址登录。</div>
  <p class="hint">如需订阅或获取访问权限，请联系管理员。</p>
</div>
</body>
</html>
